# Misfits - Cheap, human-compatible prosthetic hands and feet.

- type: entity
  id: MisfitsProstheticPart
  parent: BasePart
  name: prosthetic body part
  description: A mechanical replacement for a missing human extremity.
  abstract: true
  components:
  - type: Damageable
    damageContainer: Inorganic
  - type: StaticPrice
    price: 2

# Simple hands: cheapest construction and the largest melee penalty.
- type: entity
  id: MisfitsProstheticSimpleLeftHand
  parent: [MisfitsProstheticPart, BaseLeftHand]
  name: simple prosthetic left hand
  description: A crude replacement hand. Its stiff grip reduces melee damage by 20 percent.
  components:
  - type: BodyPart
    baseLayerId: MisfitsProstheticSimpleLeftHand
  - type: ProstheticLimb
    meleeDamageModifier: 0.8
  - type: Sprite
    sprite: _Misfits/Mobs/Species/Human/Prosthetics/prosthetics.rsi
    state: left_hand_simple
  - type: Construction
    graph: MisfitsProstheticGraph
    node: simpleLeftHand

- type: entity
  id: MisfitsProstheticSimpleRightHand
  parent: [MisfitsProstheticPart, BaseRightHand]
  name: simple prosthetic right hand
  description: A crude replacement hand. Its stiff grip reduces melee damage by 20 percent.

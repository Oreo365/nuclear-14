- type: entity
  parent: N14ClothingOuterBase
  id: M14ClothingOuterHighwayPatrolJacket
  name: highway patrol jacket
  description: An old police motorcycle jacket with internal padding and a gold badge with the logo of the Utah State Troopers
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/ahp_suit.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/ahp_suit.rsi
  - type: Armor
    modifiers:
     coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.9
        Heat: 0.9
    priceMultiplier: 0.5
  - type: Butcherable
    butcheringType: Knife
    spawned:

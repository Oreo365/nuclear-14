# NCR Rank Pin Progression Loadouts
# Officers (Command tier): Captain (O-3) default → Major (O-4) at 20h NCROfficer
# Officers (Junior tier):  2LT (O-1) default → 1LT (O-2) at 20h NCROfficer
# NCOs:                    CPL (E-4) default → SGT (E-5) at 20h → SSG (E-6) at 40h → SFC (E-7) at 60h NCRNCO
# Specialists:             PV2 (E-2) default → PFC (E-3) at 20h → SPC (E-4) at 40h (role-specific tracker)

# ── COMMAND OFFICER PINS (NCRCommander / NCRDoctor) ──────────────────────────

- type: loadout
  id: LoadoutNCRPinCaptainCommander
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - NCRCommander
        - NCRDoctor
  items:
    - ClothingNeckPinNCRCaptain

- type: loadout
  id: LoadoutNCRPinMajorCommander
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - NCRCommander
    - !type:CharacterPlaytimeRequirement
      tracker: NCRCommander
      min: 72000 # 20 hours as Commander
  items:
    - ClothingNeckPinNCRMajor

- type: loadout
  id: LoadoutNCRPinMajorDoctor
  category: Roles
  cost: 1
  exclusive: true
  requirements:
    - !type:CharacterJobRequirement
      jobs:
        - NCRDoctor
    - !type:CharacterPlaytimeRequirement
      tracker: NCRDoctor
      min: 72000 # 20 hours as Doctor
  items:
    - ClothingNeckPinNCRMajor

